<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>PWA Inventario</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body style="font-family: Arial; background: #f0f0f0; margin: 0">
    <header
      style="background: #000; color: #fff; padding: 20px; text-align: center"
    >
      <h1>Control de Inventario</h1>
      <div>
        Estado:
        <span id="status" style="padding: 5px 10px; border-radius: 5px"
          >Cargando...</span
        >
      </div>
    </header>

    <main style="max-width: 500px; margin: auto; padding: 20px">
      <form
        id="product-form"
        style="
          display: flex;
          flex-direction: column;
          gap: 10px;
          background: white;
          padding: 20px;
          border-radius: 8px;
        "
      >
        <input
          type="text"
          id="nombre"
          placeholder="Producto"
          required
          style="padding: 10px"
        />
        <input
          type="number"
          id="cantidad"
          placeholder="Cantidad"
          required
          style="padding: 10px"
        />
        <button
          type="submit"
          style="
            padding: 10px;
            background: orange;
            border: none;
            font-weight: bold;
            cursor: pointer;
          "
        >
          Guardar
        </button>
      </form>

      <h2>Inventario Local</h2>
      <ul id="lista-productos" style="padding: 0"></ul>
    </main>

    <script src="db.js"></script>
    <script src="app.js"></script>
  </body>
</html>
